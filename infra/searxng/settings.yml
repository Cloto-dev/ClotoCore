use_default_settings: true

server:
  secret_key: "cloto-searxng-local-only"
  bind_address: "0.0.0.0"
  port: 8080

search:
  safe_search: 0
  default_lang: "ja-JP"

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: github
    engine: github
    shortcut: gh
