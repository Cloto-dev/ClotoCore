name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7

  build:
    name: Build (${{ matrix.platform }})
    needs: build-dashboard
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            binary: cloto_system
            archive: tar.gz

          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            binary: cloto_system
            archive: tar.gz

          - platform: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            cross: false
            binary: cloto_system
            archive: tar.gz

          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            binary: cloto_system
            archive: tar.gz

          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            binary: cloto_system.exe
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download dashboard artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dashboard-dist
          path: dashboard/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: release-${{ matrix.target }}

      # H-11: Pre-build version validation
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches Cargo.toml
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ "${{ steps.version.outputs.version }}" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) != Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install ARM64 strip tool
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --package cloto_core

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --package cloto_core

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Strip binary (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          STAGING="cloto-${{ steps.version.outputs.version }}-${{ matrix.platform }}"
          mkdir -p "${STAGING}"

          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${STAGING}/"
          cp .env.example "${STAGING}/"

          tar czf "${STAGING}.tar.gz" "${STAGING}"

          # L-13: Verify archive was created successfully
          if [[ ! -f "${STAGING}.tar.gz" ]]; then
            echo "::error::Failed to create archive ${STAGING}.tar.gz"
            exit 1
          fi

          # Bare binary for self-update mechanism (update.rs expects this name)
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "cloto_system-${{ matrix.target }}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $platform = "${{ matrix.platform }}"
          $staging = "cloto-${version}-${platform}"

          New-Item -Type Directory -Path "${staging}" -Force | Out-Null

          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${staging}/"
          Copy-Item ".env.example" "${staging}/"

          Compress-Archive -Path "${staging}/*" -DestinationPath "${staging}.zip"

          # Bare binary for self-update mechanism
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            "cloto_system-${{ matrix.target }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.platform }}
          path: |
            cloto-${{ steps.version.outputs.version }}-${{ matrix.platform }}.*
            cloto_system-${{ matrix.target }}
          retention-days: 7

  build-tauri:
    name: Build Tauri Installer (Windows)
    needs: build-dashboard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches tauri.conf.json
        shell: bash
        run: |
          TAURI_VERSION=$(grep '"version"' dashboard/src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')
          if [[ "${{ steps.version.outputs.version }}" != "$TAURI_VERSION" ]]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) != tauri.conf.json version ($TAURI_VERSION)"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: dashboard

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: release-tauri-windows

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: dashboard
          tauriScript: npx tauri

      - name: Collect Tauri artifacts
        shell: bash
        run: |
          mkdir -p tauri-artifacts
          # NSIS installer and signatures (tauri-action outputs to project root target/)
          find target/release/bundle/nsis -type f \( -name "*.exe" -o -name "*.sig" -o -name "*.zip" -o -name "*.zip.sig" \) -exec cp {} tauri-artifacts/ \;
          echo "Tauri artifacts:"
          ls -lh tauri-artifacts/

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tauri-windows-x64
          path: tauri-artifacts/*
          retention-days: 7

  build-tauri-linux:
    name: Build Tauri Installer (Linux)
    needs: build-dashboard
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches tauri.conf.json
        shell: bash
        run: |
          TAURI_VERSION=$(grep '"version"' dashboard/src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')
          if [[ "${{ steps.version.outputs.version }}" != "$TAURI_VERSION" ]]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) != tauri.conf.json version ($TAURI_VERSION)"
            exit 1
          fi

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libxdo-dev libpipewire-0.3-dev \
            libgbm-dev libegl-dev libxcb1-dev

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: dashboard

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: release-tauri-linux

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: dashboard
          tauriScript: npx tauri

      - name: Collect Tauri artifacts
        shell: bash
        run: |
          mkdir -p tauri-artifacts
          find target/release/bundle/deb -type f -name "*.deb" -exec cp {} tauri-artifacts/ \; 2>/dev/null || true
          find target/release/bundle/appimage -type f -name "*.AppImage" -exec cp {} tauri-artifacts/ \; 2>/dev/null || true
          # Collect only AppImage signatures (skip .deb.sig — not used by Tauri updater)
          find target/release/bundle/appimage -type f -name "*.sig" -exec cp {} tauri-artifacts/ \; 2>/dev/null || true
          echo "Tauri artifacts:"
          ls -lh tauri-artifacts/

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tauri-linux-x64
          path: tauri-artifacts/*
          retention-days: 7

  build-tauri-macos:
    name: Build Tauri Installer (macOS ${{ matrix.arch }})
    needs: build-dashboard
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches tauri.conf.json
        shell: bash
        run: |
          TAURI_VERSION=$(grep '"version"' dashboard/src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')
          if [[ "${{ steps.version.outputs.version }}" != "$TAURI_VERSION" ]]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) != tauri.conf.json version ($TAURI_VERSION)"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: dashboard

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: release-tauri-macos-${{ matrix.arch }}

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing — uncomment when valid Apple Developer certificates
          # are configured in GitHub Secrets (APPLE_CERTIFICATE must be a valid
          # base64-encoded .p12 file)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization — uncomment when code signing is enabled
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: dashboard
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Collect Tauri artifacts
        shell: bash
        run: |
          mkdir -p tauri-artifacts
          find target/${{ matrix.target }}/release/bundle/dmg -type f -name "*.dmg" -exec cp {} tauri-artifacts/ \; 2>/dev/null || true
          find target/${{ matrix.target }}/release/bundle -type f -name "*.sig" -exec cp {} tauri-artifacts/ \; 2>/dev/null || true
          find target/${{ matrix.target }}/release/bundle -type f -name "*.tar.gz" -exec cp {} tauri-artifacts/ \; 2>/dev/null || true
          echo "Tauri artifacts:"
          ls -lh tauri-artifacts/

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tauri-macos-${{ matrix.arch }}
          path: tauri-artifacts/*
          retention-days: 7

  release:
    name: Create Release
    needs: [build, build-tauri, build-tauri-linux, build-tauri-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          for dir in artifacts/release-*/; do
            cp "${dir}"* release-files/ 2>/dev/null || true
          done
          # Include Tauri NSIS installer artifacts
          for dir in artifacts/tauri-*/; do
            cp "${dir}"* release-files/ 2>/dev/null || true
          done
          echo "Release files:"
          ls -lh release-files/

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Helper: find signature content for a given glob pattern
          find_sig() {
            local pattern="$1"
            for sig_file in $pattern; do
              if [[ -f "$sig_file" ]]; then
                cat "$sig_file"
                return
              fi
            done
          }

          # Helper: find artifact filename for a given glob pattern
          find_artifact() {
            local pattern="$1"
            for f in $pattern; do
              if [[ -f "$f" ]]; then
                basename "$f"
                return
              fi
            done
          }

          # Windows (NSIS)
          NSIS_ZIP_SIG=$(find_sig "release-files/*_x64-setup.nsis.zip.sig")
          NSIS_ZIP_NAME=$(find_artifact "release-files/*_x64-setup.nsis.zip")

          # Linux (AppImage)
          LINUX_SIG=$(find_sig "release-files/*.AppImage.sig")
          LINUX_NAME=$(find_artifact "release-files/*.AppImage")

          # macOS aarch64 (.tar.gz updater bundle)
          MACOS_ARM_SIG=$(find_sig "release-files/*aarch64*.app.tar.gz.sig")
          MACOS_ARM_NAME=$(find_artifact "release-files/*aarch64*.app.tar.gz")

          # macOS x86_64 (.tar.gz updater bundle)
          MACOS_X64_SIG=$(find_sig "release-files/*x64*.app.tar.gz.sig")
          MACOS_X64_NAME=$(find_artifact "release-files/*x64*.app.tar.gz")

          # Build platforms JSON
          PLATFORMS="{"

          if [[ -n "$NSIS_ZIP_SIG" && -n "$NSIS_ZIP_NAME" ]]; then
            PLATFORMS+="\"windows-x86_64\":{\"signature\":\"${NSIS_ZIP_SIG}\",\"url\":\"https://github.com/Cloto-dev/ClotoCore/releases/download/${TAG}/${NSIS_ZIP_NAME}\"}"
          fi

          if [[ -n "$LINUX_SIG" && -n "$LINUX_NAME" ]]; then
            [[ "$PLATFORMS" != "{" ]] && PLATFORMS+=","
            PLATFORMS+="\"linux-x86_64\":{\"signature\":\"${LINUX_SIG}\",\"url\":\"https://github.com/Cloto-dev/ClotoCore/releases/download/${TAG}/${LINUX_NAME}\"}"
          fi

          if [[ -n "$MACOS_ARM_SIG" && -n "$MACOS_ARM_NAME" ]]; then
            [[ "$PLATFORMS" != "{" ]] && PLATFORMS+=","
            PLATFORMS+="\"darwin-aarch64\":{\"signature\":\"${MACOS_ARM_SIG}\",\"url\":\"https://github.com/Cloto-dev/ClotoCore/releases/download/${TAG}/${MACOS_ARM_NAME}\"}"
          fi

          if [[ -n "$MACOS_X64_SIG" && -n "$MACOS_X64_NAME" ]]; then
            [[ "$PLATFORMS" != "{" ]] && PLATFORMS+=","
            PLATFORMS+="\"darwin-x86_64\":{\"signature\":\"${MACOS_X64_SIG}\",\"url\":\"https://github.com/Cloto-dev/ClotoCore/releases/download/${TAG}/${MACOS_X64_NAME}\"}"
          fi

          PLATFORMS+="}"

          if [[ "$PLATFORMS" == "{}" ]]; then
            echo "::warning::No platform signatures found, skipping latest.json"
          else
            cat > release-files/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "ClotoCore v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": ${PLATFORMS}
          }
          MANIFEST
            echo "Generated latest.json:"
            cat release-files/latest.json
          fi

      - name: Generate checksums manifest
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt 2>/dev/null || shasum -a 256 * > SHA256SUMS.txt
          echo "SHA256SUMS.txt:"
          cat SHA256SUMS.txt
          cd ..

      - name: Sign checksums manifest (cosign keyless)
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4
      - run: |
          cosign sign-blob --yes \
            --bundle release-files/SHA256SUMS.txt.bundle \
            release-files/SHA256SUMS.txt

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          # M-26: Check for existing tag before creating
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists on remote"
            exit 1
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > release-body.md << HEADER
          ## Install

          **Windows (Desktop App — recommended):**
          Download **cloto-system_${VERSION}_x64-setup.exe** from the assets below and run the NSIS installer.

          **macOS (Desktop App):**
          Download the **.dmg** file for your architecture (arm64 for Apple Silicon, x64 for Intel) from the assets below.

          **Linux (Desktop App):**
          Download the **.deb** (Debian/Ubuntu) or **.AppImage** (universal) from the assets below.

          **CLI binary (all platforms):**
          Download the archive for your platform from the assets below.

          ---
          HEADER

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          body_path: release-body.md
          append_body: true
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
