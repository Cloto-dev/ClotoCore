name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7

  build:
    name: Build (${{ matrix.platform }})
    needs: build-dashboard
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            binary: cloto_system
            archive: tar.gz

          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            binary: cloto_system
            archive: tar.gz

          - platform: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            cross: false
            binary: cloto_system
            archive: tar.gz

          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            binary: cloto_system
            archive: tar.gz

          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            binary: cloto_system.exe
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Download dashboard artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: release-${{ matrix.target }}

      # H-11: Pre-build version validation
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches Cargo.toml
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ "${{ steps.version.outputs.version }}" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) != Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install ARM64 strip tool
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --package cloto_core

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --package cloto_core

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Strip binary (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          STAGING="cloto-${{ steps.version.outputs.version }}-${{ matrix.platform }}"
          mkdir -p "${STAGING}"

          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${STAGING}/"
          cp .env.example "${STAGING}/"

          tar czf "${STAGING}.tar.gz" "${STAGING}"

          # L-13: Verify archive was created successfully
          if [[ ! -f "${STAGING}.tar.gz" ]]; then
            echo "::error::Failed to create archive ${STAGING}.tar.gz"
            exit 1
          fi

          # Bare binary for self-update mechanism (update.rs expects this name)
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "cloto_system-${{ matrix.target }}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $platform = "${{ matrix.platform }}"
          $staging = "cloto-${version}-${platform}"

          New-Item -Type Directory -Path "${staging}" -Force | Out-Null

          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${staging}/"
          Copy-Item ".env.example" "${staging}/"

          Compress-Archive -Path "${staging}/*" -DestinationPath "${staging}.zip"

          # Bare binary for self-update mechanism
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            "cloto_system-${{ matrix.target }}"

      - name: Generate checksums
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          TARGET="${{ matrix.target }}"

          if command -v sha256sum &>/dev/null; then
            SHA_CMD="sha256sum"
          else
            SHA_CMD="shasum -a 256"
          fi

          # Archive checksum
          if [[ "${{ matrix.archive }}" == "tar.gz" ]]; then
            $SHA_CMD "cloto-${VERSION}-${PLATFORM}.tar.gz" > "cloto-${VERSION}-${PLATFORM}.tar.gz.sha256"
          else
            $SHA_CMD "cloto-${VERSION}-${PLATFORM}.zip" > "cloto-${VERSION}-${PLATFORM}.zip.sha256"
          fi

          # Bare binary checksum (for self-update verification)
          $SHA_CMD "cloto_system-${TARGET}" > "cloto_system-${TARGET}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            cloto-${{ steps.version.outputs.version }}-${{ matrix.platform }}.*
            cloto_system-${{ matrix.target }}
            cloto_system-${{ matrix.target }}.sha256
          retention-days: 7

  build-tauri:
    name: Build Tauri Installer (Windows)
    needs: build-dashboard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches tauri.conf.json
        shell: bash
        run: |
          TAURI_VERSION=$(grep '"version"' dashboard/src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')
          if [[ "${{ steps.version.outputs.version }}" != "$TAURI_VERSION" ]]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) != tauri.conf.json version ($TAURI_VERSION)"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: dashboard

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: release-tauri-windows

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: dashboard
          tauriScript: npx tauri

      - name: Collect Tauri artifacts
        shell: bash
        run: |
          mkdir -p tauri-artifacts
          # NSIS installer and signatures (tauri-action outputs to project root target/)
          find target/release/bundle/nsis -type f \( -name "*.exe" -o -name "*.sig" -o -name "*.zip" -o -name "*.zip.sig" \) -exec cp {} tauri-artifacts/ \;
          echo "Tauri artifacts:"
          ls -lh tauri-artifacts/

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tauri-windows-x64
          path: tauri-artifacts/*
          retention-days: 7

  release:
    name: Create Release
    needs: [build, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          for dir in artifacts/release-*/; do
            cp "${dir}"* release-files/ 2>/dev/null || true
          done
          # Include Tauri NSIS installer artifacts
          for dir in artifacts/tauri-*/; do
            cp "${dir}"* release-files/ 2>/dev/null || true
          done
          echo "Release files:"
          ls -lh release-files/

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read NSIS zip signature
          NSIS_ZIP_SIG=""
          for sig_file in release-files/*_x64-setup.nsis.zip.sig; do
            if [[ -f "$sig_file" ]]; then
              NSIS_ZIP_SIG=$(cat "$sig_file")
              break
            fi
          done

          # Determine NSIS zip filename
          NSIS_ZIP_NAME=""
          for zip_file in release-files/*_x64-setup.nsis.zip; do
            if [[ -f "$zip_file" ]]; then
              NSIS_ZIP_NAME=$(basename "$zip_file")
              break
            fi
          done

          if [[ -z "$NSIS_ZIP_SIG" || -z "$NSIS_ZIP_NAME" ]]; then
            echo "::warning::NSIS zip or signature not found, skipping latest.json"
          else
            cat > release-files/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "ClotoCore v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_ZIP_SIG}",
                "url": "https://github.com/Cloto-dev/ClotoCore/releases/download/${TAG}/${NSIS_ZIP_NAME}"
              }
            }
          }
          MANIFEST
            echo "Generated latest.json:"
            cat release-files/latest.json
          fi

      - name: Generate checksums manifest
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt 2>/dev/null || shasum -a 256 * > SHA256SUMS.txt
          echo "SHA256SUMS.txt:"
          cat SHA256SUMS.txt
          cd ..

      - name: Sign checksums manifest (cosign keyless)
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3
      - run: |
          cosign sign-blob --yes \
            --output-signature release-files/SHA256SUMS.txt.sig \
            --output-certificate release-files/SHA256SUMS.txt.pem \
            release-files/SHA256SUMS.txt
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          # M-26: Check for existing tag before creating
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists on remote"
            exit 1
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > release-body.md << HEADER
          ## Install

          **Windows (Desktop App — recommended):**
          Download **cloto-system_${VERSION}_x64-setup.exe** from the assets below and run the NSIS installer.

          **CLI binary (all platforms):**
          Download the archive for your platform from the assets below.

          ---
          HEADER

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ClotoCore v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          body_path: release-body.md
          append_body: true
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
