# Cloto MCP Server Configuration
# Servers listed here are auto-connected on kernel startup.
# Environment variables use ${VAR} syntax (resolved from process env).

[[servers]]
id = "tool.terminal"
command = "python"
args = ["mcp-servers/terminal/server.py"]
transport = "stdio"
auto_restart = true
[servers.tool_validators]
execute_command = "sandbox"

[[servers]]
id = "tool.agent_utils"
command = "python"
args = ["mcp-servers/agent_utils/server.py"]
transport = "stdio"
auto_restart = true

[[servers]]
id = "tool.cron"
command = "python"
args = ["mcp-servers/cron/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
CLOTO_API_URL = "http://127.0.0.1:8081"
CLOTO_API_KEY = "${CLOTO_API_KEY}"

[[servers]]
id = "mind.deepseek"
display_name = "DeepSeek"
command = "python"
args = ["mcp-servers/deepseek/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
# API key managed by kernel LLM proxy (MGP §13.4)
DEEPSEEK_API_URL = "http://127.0.0.1:8082/v1/chat/completions"
DEEPSEEK_PROVIDER = "deepseek"

[[servers]]
id = "mind.cerebras"
display_name = "Cerebras"
command = "python"
args = ["mcp-servers/cerebras/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
# API key managed by kernel LLM proxy (MGP §13.4)
CEREBRAS_API_URL = "http://127.0.0.1:8082/v1/chat/completions"
CEREBRAS_PROVIDER = "cerebras"

[[servers]]
id = "mind.claude"
display_name = "Claude"
command = "python"
args = ["mcp-servers/claude/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
# API key managed by kernel LLM proxy (MGP §13.4)
CLAUDE_API_URL = "http://127.0.0.1:8082/v1/messages"
CLAUDE_PROVIDER = "claude"

[[servers]]
id = "mind.ollama"
display_name = "Ollama"
command = "python"
args = ["mcp-servers/ollama/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
OLLAMA_BASE_URL = "http://localhost:11434"
OLLAMA_MODEL = "${OLLAMA_MODEL}"
OLLAMA_ENABLE_THINKING = "${OLLAMA_ENABLE_THINKING}"

[[servers]]
id = "memory.ks22"
command = "python"
args = ["mcp-servers/ks22/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
KS22_EMBEDDING_MODE = "http"
KS22_EMBEDDING_URL = "http://127.0.0.1:8401/embed"
KS22_LLM_PROVIDER = "cerebras"
KS22_LLM_MODEL = "gpt-oss-120b"

[[servers]]
id = "tool.embedding"
command = "python"
args = ["mcp-servers/embedding/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
EMBEDDING_PROVIDER = "onnx_miniml"
EMBEDDING_HTTP_PORT = "8401"

[[servers]]
id = "tool.websearch"
command = "python"
args = ["mcp-servers/websearch/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
CLOTO_SEARCH_PROVIDER = "searxng"
SEARXNG_URL = "http://localhost:8080"

[[servers]]
id = "tool.research"
command = "python"
args = ["mcp-servers/research/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
CLOTO_SEARCH_PROVIDER = "searxng"
SEARXNG_URL = "http://localhost:8080"
RESEARCH_EXTRACT_PROVIDER = "cerebras"
RESEARCH_EVALUATE_PROVIDER = "deepseek"
RESEARCH_SYNTHESIZE_PROVIDER = "deepseek"

[[servers]]
id = "vision.gaze_webcam"
command = "python"
args = ["mcp-servers/gaze/server.py"]
transport = "stdio"
auto_restart = false

# ── Multimodal Servers (manual start) ──

[[servers]]
id = "vision.capture"
command = "python"
args = ["mcp-servers/capture/server.py"]
transport = "stdio"
auto_restart = false
[servers.env]
VISION_OLLAMA_URL = "http://localhost:11434"
VISION_MODEL = "llava"
VISION_OCR_MODE = "hybrid"

[[servers]]
id = "tool.imagegen"
command = "python"
args = ["mcp-servers/imagegen/server.py"]
transport = "stdio"
auto_restart = false
[servers.env]
SD_API_URL = "http://127.0.0.1:7860"

[[servers]]
id = "voice.stt"
command = "python"
args = ["mcp-servers/stt/server.py"]
transport = "stdio"
auto_restart = false
[servers.env]
STT_MODEL = "base"
STT_LANGUAGE = "ja"

[[servers]]
id = "voice.tts"
command = "python"
args = ["mcp-servers/tts/server.py"]
transport = "stdio"
auto_restart = false
[servers.env]
TTS_RATE = "150"
