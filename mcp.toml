# Cloto MCP Server Configuration
# Servers listed here are auto-connected on kernel startup.
# Environment variables use ${VAR} syntax (resolved from process env).
#
# [paths] variables are expanded in command/args before relative path resolution.
# Values may reference env vars: servers = "${CLOTO_MCP_SERVERS}"
#
# MGP §8-10 Isolation fields (optional per-server):
#   seal = "sha256:..."                  # HMAC-SHA256 integrity seal (L0 Magic Seal)
#   [servers.mgp]
#   trust_level = "standard"             # core | standard | experimental | untrusted
#   [servers.isolation]                  # Override defaults derived from trust_level
#   memory_limit_mb = 512               # Phase 2: OS-enforced memory limit
#   max_child_processes = 5             # Phase 2: OS-enforced process limit
#   filesystem_scope = "sandbox"        # unrestricted | sandbox | readonly | none
#   network_scope = "proxyonly"         # unrestricted | proxyonly | none

[paths]
servers = "../cloto-mcp-servers/servers"

[[servers]]
id = "tool.terminal"
command = "python"
args = ["${servers}/terminal/server.py"]
transport = "stdio"
auto_restart = true
[servers.tool_validators]
execute_command = "sandbox"

[[servers]]
id = "tool.agent_utils"
command = "python"
args = ["${servers}/agent_utils/server.py"]
transport = "stdio"
auto_restart = true

[[servers]]
id = "tool.cron"
command = "python"
args = ["${servers}/cron/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
CLOTO_API_URL = "http://127.0.0.1:8081"
CLOTO_API_KEY = "${CLOTO_API_KEY}"

[[servers]]
id = "mind.deepseek"
display_name = "DeepSeek"
command = "python"
args = ["${servers}/deepseek/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
# API key managed by kernel LLM proxy (MGP §13.4)
DEEPSEEK_API_URL = "http://127.0.0.1:8082/v1/chat/completions"
DEEPSEEK_PROVIDER = "deepseek"

[[servers]]
id = "mind.cerebras"
display_name = "Cerebras"
command = "python"
args = ["${servers}/cerebras/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
# API key managed by kernel LLM proxy (MGP §13.4)
CEREBRAS_API_URL = "http://127.0.0.1:8082/v1/chat/completions"
CEREBRAS_PROVIDER = "cerebras"

[[servers]]
id = "mind.claude"
display_name = "Claude"
command = "python"
args = ["${servers}/claude/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
# API key managed by kernel LLM proxy (MGP §13.4)
CLAUDE_API_URL = "http://127.0.0.1:8082/v1/messages"
CLAUDE_PROVIDER = "claude"

[[servers]]
id = "mind.ollama"
display_name = "Ollama"
command = "python"
args = ["${servers}/ollama/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
OLLAMA_BASE_URL = "http://localhost:11434"
OLLAMA_MODEL = "${OLLAMA_MODEL}"
OLLAMA_ENABLE_THINKING = "${OLLAMA_ENABLE_THINKING}"

[[servers]]
id = "memory.cpersona"
command = "python"
args = ["${servers}/cpersona/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
CPERSONA_EMBEDDING_MODE = "http"
CPERSONA_EMBEDDING_URL = "http://127.0.0.1:8401/embed"
CPERSONA_LLM_PROVIDER = "cerebras"
CPERSONA_LLM_MODEL = "gpt-oss-120b"

[[servers]]
id = "tool.embedding"
command = "python"
args = ["${servers}/embedding/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
EMBEDDING_PROVIDER = "onnx_miniml"
EMBEDDING_HTTP_PORT = "8401"

[[servers]]
id = "tool.websearch"
command = "python"
args = ["${servers}/websearch/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
CLOTO_SEARCH_PROVIDER = "ddg"
SEARXNG_URL = "http://localhost:8080"
TAVILY_API_KEY = "${TAVILY_API_KEY}"

[[servers]]
id = "tool.research"
command = "python"
args = ["${servers}/research/server.py"]
transport = "stdio"
auto_restart = true
[servers.env]
CLOTO_SEARCH_PROVIDER = "auto"
SEARXNG_URL = "http://localhost:8080"
TAVILY_API_KEY = "${TAVILY_API_KEY}"
RESEARCH_EXTRACT_PROVIDER = "cerebras"
RESEARCH_EVALUATE_PROVIDER = "deepseek"
RESEARCH_SYNTHESIZE_PROVIDER = "deepseek"

[[servers]]
id = "vision.gaze_webcam"
command = "python"
args = ["${servers}/gaze/server.py"]
transport = "stdio"
auto_restart = false

# ── Multimodal Servers (manual start) ──

[[servers]]
id = "vision.capture"
command = "python"
args = ["${servers}/capture/server.py"]
transport = "stdio"
auto_restart = false
[servers.env]
VISION_OLLAMA_URL = "http://localhost:11434"
VISION_MODEL = "llava"
VISION_OCR_MODE = "hybrid"

[[servers]]
id = "tool.imagegen"
command = "python"
args = ["${servers}/imagegen/server.py"]
transport = "stdio"
auto_restart = false
[servers.env]
SD_API_URL = "http://127.0.0.1:7860"

[[servers]]
id = "voice.stt"
command = "python"
args = ["${servers}/stt/server.py"]
transport = "stdio"
auto_restart = false
[servers.env]
STT_MODEL = "base"
STT_LANGUAGE = "ja"

[[servers]]
id = "output.avatar"
command = "${servers}/avatar/target/debug/mgp-avatar"
args = []
transport = "stdio"
auto_restart = false
[servers.env]
VOICEVOX_URL = "http://localhost:50021"
VOICEVOX_SPEAKER = "47"
VOICEVOX_SPEED = "1.0"
